# Homepage copy. Edit here to change section text without touching JS.

hero:
  title_line_1: "Learn Salsa"
  title_line_2: "in Copenhagen"
  lede: >
    Salsa is a fun and fast couple dance wildly popular in Copenhagen.
    LA-Style Salsa (on1) is a style of salsa known for its energy and elegance.
    Learn salsa with us — no experience or partner needed, and you can
    start this week!
  photo: "assets/images/photo-class-1.png"
  cta_primary:
    label: "See the classes"
    href: "#schedule"
  cta_secondary:
    label: "Register"
    href: "/registration"

wednesday_classes:
  eyebrow: "Schedule"
  title: "Wednesday classes"
  subtitle: "Season runs September 2 – October 28 — 8 Wednesdays. No class in week 42 (autumn holidays)."

# Header for the combined Events section (workshops + socials).
# When there are no events in _data/workshops.yml or _data/socials.yml,
# the placeholder cards below are shown instead.
events:
  eyebrow: "Events"
  headline: "Upcoming events"
  empty_note: "Nothing on the calendar right now — but we run these regularly. Follow us on Facebook for dates."
  placeholders:
    - title: "Salsa at Six"
      kind: "social"
      text: "Early-evening crossbody social on selected Fridays — a relaxed way to start the weekend."
    - title: "NY meets LA"
      kind: "social"
      text: "Our big social evening, featuring both on1 and on2 salsa, with the occasional cha-cha-cha."
    - title: "Workshops"
      kind: "improver"
      text: "Occasional deep-dive workshops on specific topics — turns, styling, musicality, and more."

location:
  label: "All classes at"
  address: "Union · Nørre Allé 7, room Aula (first floor), 2200 København"
  cta_label: "Register for the season"
  cta_href: "/registration"

classes_intro:
  title: "Which class is for you?"
  lede: >
    Are you unsure about your level, or have no experience but would like to try out?
    <a href="/contact">Reach out to us</a> — we'll help you pick.

pricing:
  title: "Autumn 2026 pricing."
  dropin_callout: >
    Drop in for a single class — 100 DKK student / 110 DKK regular.

register:
  kicker: "Ready when you are"
  title_line_1: "Come"
  title_line_2: "dance with us."
  lede: "Pick a class, and we'll see you on Wednesday."
  photo: "assets/images/photo-class-1.png"
  cta_primary:
    label: "Register now"
    href: "/registration"
  cta_secondary:
    label: "Payments"
    href: "/payments"

