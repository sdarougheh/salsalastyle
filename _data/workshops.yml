# Upcoming workshops. Combined with socials into "Events" on the homepage.
# Same schema as _data/socials.yml.
#
# Fields:
#   title         (required)
#   date          (required) ISO format "YYYY-MM-DD" — drives the date block,
#                            sorting, and the calendar invite
#   start / end   optional "HH:MM" 24h — shown as the time and used for the invite
#   location      optional — shown on the card and put in the calendar invite
#   lede          optional — short description
#   info_url      optional — e.g. the Facebook event (opens "Event info")
#   register_url  optional — if set, shows a "Register" button
#   kind          optional — color key from _data/kinds.yml (default: improver)
#   hidden        optional — set true to hide without deleting
#
- title: "LA-Style Afternoon"
  date: "2026-07-11"
  start: "15:00"
  end: "17:00"
  location: "Inflow Studio · Heimdalsgade 35, 2200 København"
  lede: "An intensive LA-style Salsa afternoon — workshops and free practice time at Inflow Studio."
  info_url: "https://fb.me/e/7TocP1vwF"
  register_url: "/registration_workshop"
  calendar_description: |
    Join us for an intensive LA-style Salsa afternoon with workshop and practica at Inflow Studio - a super central location with great air conditioning and wooden dance floor!

    WHEN:
    Saturday 11.07.

    15:00 - 15:45 : Workshop: LA-Style technique
    15:45 - 16:15 : Free practice time
    16:15 - 17:00 : Workshop: Intermediate

    LA-Style technique: open-level workshop with focus on technique. Everyone will have something to work on, from improver to upper intermediate level.

    Intermediate workshop: To benefit from the workshop, you should be comfortable with salsa patterns (roughly 6 months of dancing or more), or have taken our improver-level class before. If in doubt, reach out!

    WHERE:
    Inflow Studio

    ENTRÉ:
    Maximum participants: 20.

    PRICES
    One workshop and practice time: 100 DKK
    Two workshops and practice time: 150 DKK

    REGISTRATION
    Sign up on our website: https://www.salsalastyle.dk/registration_workshop

    ADDITIONAL INFORMATION
    Please arrive a few minutes early, classes will start on time!
    Car parking is not allowed in the courtyard. Public paid parking is available on Heimdalsgade. Outdoor shoes or shoes with heels (that can scratch or leave marks on the floor) are not allowed inside the studios.

