# Class descriptions used in the "Classes" section of the homepage.
- name: "Improvers"
  tag: "Mon 20:00"
  kind: "improver"
  body: "Perfect for dancers comfortable with left and right turns in Cuban salsa, or with good experience in other partner dances. We cover the difference between Cuban and LA-Style, turns, cross-body leads, and fun variations like arm tosses."
- name: "Intermediate 1"
  tag: "Wed 19:00"
  kind: "inter1"
  body: "Inside and outside turns, 360s, and other intermediate concepts. Focus on connection and technique, making sure followers don't predict the patterns so you can take it straight to the social floor."
- name: "Guided Practica"
  tag: "Mon 21:00"
  kind: "practica"
  body: "Accessible only for our students, at no extra cost. Slow-to-medium tempo songs with clear rhythm. Practice what you learned in class — the teachers are around for feedback."
- name: "Intermediate 2"
  tag: "Wed 20:00"
  kind: "inter2"
  body: "Builds on Intermediate 1 with more difficult techniques such as double turns. More combinations, more attention to technique and body positioning so everything works effortlessly with faster music."
