# Class descriptions used in the "Classes" section of the homepage.
- name: "Beginners"
  tag: "Wed 19:00"
  kind: "beginner"
  body: "For complete beginners — no experience or partner needed, come as you are. We start from the very basics: rhythm, timing, the basic step, and how to lead and follow."
- name: "Intermediate 1"
  tag: "Wed 20:00"
  kind: "inter1"
  body: "Inside and outside turns, 360s, and other intermediate concepts. Focus on connection and technique, making sure followers don't predict the patterns so you can take it straight to the social floor."
- name: "Intermediate 2"
  tag: "Wed 21:00"
  kind: "inter2"
  body: "Builds on Intermediate 1 with more difficult techniques such as double turns. More combinations, more attention to technique and body positioning so everything works effortlessly with faster music."
