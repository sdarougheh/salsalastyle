# Upcoming socials. Combined with workshops into "Events" on the homepage.
# Same schema as _data/workshops.yml.
#
# Fields:
#   title         (required)
#   date          (required) ISO format "YYYY-MM-DD" — drives the date block,
#                            sorting, and the calendar invite
#   start / end   optional "HH:MM" 24h — shown as the time and used for the invite
#   location      optional — shown on the card and put in the calendar invite
#   lede          optional — short description
#   info_url      optional — e.g. the Facebook event (opens "Event info")
#   register_url  optional — if set, shows a "Register" button
#   kind          optional — color key from _data/kinds.yml (default: social)
#   hidden        optional — set true to hide without deleting
#
- title: "Salsa Social"
  date: "2026-04-27"
  start: "20:00"
  end: "23:00"
  location: "Inflow Studio · Heimdalsgade 35, 2200 København"
  lede: "An evening of crossbody salsa social dancing. All welcome."
  info_url: "https://www.facebook.com/events/1330308059207251"
  calendar_description: |
    100% Crossbody Salsa — Los Angeles meets New York

    Crossbody Salsa refers to all the linear variants of salsa, for example LA or NY-Style -- which are not danced as much in Copenhagen. We provide an environment for crossbody dancers to meet each other and dance all night long!

    Whether you dance on1 (LA-Style) or on2 (NY-Style), this is your night. Crossbody salsa all night, with music for both on1 and on2. All levels welcome!

    Program
    20:00–20:30 — LA-Style Workshop (open level). Need some crossbody inspiration? Join the open-level LA-Style workshop and pick up some new patterns for the night!
    20:30–23:00 — Social dancing. 90% crossbody salsa, 10% cha-cha-cha

    Studio A of Inflow Studio, centrally located with wonderful wooden dance floor

    Entry
    70 DKK — to be paid via MobilePay either at the door or to box 2244AK (https://qr.mobilepay.dk/box/0e87a242-413a-4d41-8b99-0025af193ddc/pay-in)

    Additional info
    To access the studio, enter through the gate to the courtyard, the building door is then to your right. Car parking is not allowed in the courtyard. Public paid parking is available on Heimdalsgade. Outdoor shoes or shoes that can scratch or leave marks on the floor are not allowed inside the studios.

    For our weekly LA-Style courses visit https://www.salsalastyle.dk

