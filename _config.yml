# Site settings
title: "Salsa LA-Style"
description: "Teaching LA-style Salsa in Copenhagen"
url: "https://www.salsalastyle.dk"

# Build settings
markdown: kramdown

# Exclude legacy / working files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - .dockerignore
  - .travis.yml
  - README.md
  - uploads
  - "Salsa LA-Style Home.html"
  - _vendor

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Season info (edit in one place)
season:
  name: "Summer 2026"
  dates: "May 4 – June 26"
  early_bird_until: "April 19th"
