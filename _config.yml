# Site settings — Salsa LA-Style Copenhagen
title: "Salsa LA-Style"
description: "Teaching LA-style Salsa in Copenhagen"
url: "https://www.salsalastyle.dk"

# Build settings
markdown: kramdown
timezone: Europe/Copenhagen
future: true   # publish future-dated event pages

# Events collection — one file per event under _events/, auto-published to
# /events/<name>/ with its own page. See _layouts/event.html.
collections:
  events:
    output: true
    permalink: /events/:name/

# Default social-share image for pages that don't set their own.
og_image: "/assets/images/photo-class-2.png"

# Exclude legacy / working files from the build
exclude:
  - Gemfile
  - Gemfile.lock
  - Dockerfile
  - .dockerignore
  - .travis.yml
  - README.md
  - uploads
  - "Salsa LA-Style Home.html"
  - _vendor

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "events"
    values:
      layout: "event"

# Season info (edit in one place)
season:
  name: "Autumn 2026"
  dates: "September 2 – October 28"
  # early_bird_until: "April 19th"   # uncomment to show early bird banner
  # --- used to generate the recurring "Add to calendar" invites for classes ---
  first_class: "2026-09-02"          # date of the first Wednesday (ISO)
  weeks: 9                           # total occurrences including any holiday
  exdates:                           # dates to skip (no class)
    - "2026-10-14"                   # week 42, autumn holidays

# MobilePay payment boxes. Edit here whenever the box changes.
# `classes` is used by /payments and the class success page;
# `workshops` is used by the workshop success page. They can point at the
# same box (current default) or be split if needed.
mobilepay:
  classes:
    box: "7681ZK"
    url: "https://qr.mobilepay.dk/box/5f19d580-4664-4ff7-bb8a-7b3349d245c0/pay-in"
  workshops:
    box: "7681ZK"
    url: "https://qr.mobilepay.dk/box/5f19d580-4664-4ff7-bb8a-7b3349d245c0/pay-in"
