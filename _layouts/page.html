<!doctype html>
<html lang="en">
  {% include head.html %}
  <body class="page-body">
    {% include facebook_pixel.html %}

    <header class="page-nav">
      <a class="page-nav-brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="">
        <span>Salsa LA-Style</span>
      </a>
      <nav class="page-nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/payments' | relative_url }}">Payments</a>
        <a href="{{ '/registration' | relative_url }}">Register</a>
      </nav>
    </header>

    <main class="page-main">
      {% if page.title %}<h1 class="page-title">{{ page.title }}</h1>{% endif %}
      {{ content }}
    </main>

    <footer class="page-footer-simple">
      <div>
        <a href="{{ '/terms' | relative_url }}">Terms</a> ·
        <a href="{{ '/privacy' | relative_url }}">Privacy</a> ·
        <a href="{{ '/about' | relative_url }}">About</a>
      </div>
      <div>© 2026 Salsa LA-Style Copenhagen</div>
    </footer>
  </body>
</html>
